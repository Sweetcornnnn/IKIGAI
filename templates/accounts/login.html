{% extends 'accounts/base.html' %}

{% block title %}Login - IKIGAI{% endblock %}
{% block subtitle %}Welcome back{% endblock %}

{% block content %}
<style>
    .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }
    .password-wrapper input {
        flex: 1;
        padding-right: 44px;
    }
    .toggle-password {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 18px;
        padding: 0;
        line-height: 1;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .toggle-password:hover {
        color: var(--text-white);
    }
    .toggle-password:focus {
        outline: none;
    }
</style>

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter your username" required>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
            <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password visibility">
                <i class="fas fa-eye"></i>
            </button>
        </div>
    </div>

    <button type="submit" class="btn-primary">Sign In</button>
</form>

<div class="auth-links">
    Don't have an account? <a href="{% url 'accounts:register' %}">Create one</a>
</div>

<script>
    // ─── Admin Easter Egg (unchanged) ───
    (function() {
        let clickCount = 0;
        let timer = null;
        const titleElement = document.querySelector('.card-header h1 span');
        if (titleElement) {
            titleElement.style.cursor = 'pointer';
            titleElement.title = '👀 Click 7 times for admin access';
            titleElement.addEventListener('click', function(e) {
                e.stopPropagation();
                clickCount++;
                if (timer) clearTimeout(timer);
                timer = setTimeout(() => { clickCount = 0; }, 3000);
                if (clickCount === 7) {
                    clickCount = 0;
                    clearTimeout(timer);
                    titleElement.textContent = '🛡️ Redirecting...';
                    titleElement.style.color = '#C9A96E';
                    setTimeout(() => {
                        window.location.href = '/admin-dashboard/login/';
                    }, 500);
                }
            });
        }
    })();

    // ─── Password Toggle ───
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function() {
            const targetId = this.dataset.target;
            const input = document.getElementById(targetId);
            if (!input) return;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            const icon = this.querySelector('i');
            icon.className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
            this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        });
    });
</script>
{% endblock %}
