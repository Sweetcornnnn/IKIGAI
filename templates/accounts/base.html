<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IKIGAI{% endblock %}</title>
    <style>
        :root {
            --gold: #C9A96E;
            --dark-bg: #0E1520;
            --panel-dark: #111927;
            --text-white: #FFFFFF;
            --text-muted: rgba(255,255,255,0.38);
            --success-green: #6FAF8A;
            --danger-red: #E07070;
            --border-subtle: rgba(255,255,255,0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .card {
            background-color: var(--panel-dark);
            border-radius: 16px;
            padding: 32px 28px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: -0.5px;
        }

        .card-header h1 span {
            color: var(--gold);
            cursor: pointer;
            transition: color 0.2s;
        }

        .card-header h1 span:hover {
            color: #d4b87a;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background-color: rgba(255,255,255,0.04);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.25);
        }

        .form-group .help-text {
            color: rgba(255,255,255,0.3);
            font-size: 11px;
            margin-top: 4px;
        }

        .form-errors {
            color: var(--danger-red);
            font-size: 12px;
            margin-top: 4px;
            list-style: none;
        }

        .form-errors li {
            margin-bottom: 2px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--gold);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
        }

        .btn-primary:hover {
            opacity: 0.85;
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background-color: rgba(255,255,255,0.04);
            color: var(--text-white);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            margin-top: 6px;
        }

        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.08);
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .auth-links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .message.success {
            background-color: rgba(111, 175, 138, 0.15);
            color: var(--success-green);
            border: 1px solid rgba(111, 175, 138, 0.2);
        }

        .message.error {
            background-color: rgba(224, 112, 112, 0.15);
            color: var(--danger-red);
            border: 1px solid rgba(224, 112, 112, 0.2);
        }

        .message.info {
            background-color: rgba(201, 169, 110, 0.15);
            color: var(--gold);
            border: 1px solid rgba(201, 169, 110, 0.2);
        }

        /* Profile specific styles */
        .profile-avatar {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-avatar img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
        }

        .profile-avatar .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: var(--gold);
            border: 2px solid rgba(201,169,110,0.3);
            margin: 0 auto;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            padding: 16px 0;
            border-top: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat .number {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
        }

        .profile-stat .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1><span>IKIGAI</span></h1>
                <p>{% block subtitle %}Find your purpose{% endblock %}</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </div>
</body>
</html>
