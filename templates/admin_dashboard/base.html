<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - IKIGAI{% endblock %}</title>
    <style>
        :root {
            --admin-gold: #C9A96E;
            --admin-bg: #0a0f1a;
            --admin-panel: #111927;
            --text-white: #FFFFFF;
            --text-muted: rgba(255,255,255,0.38);
            --text-secondary: rgba(255,255,255,0.7);
            --border-subtle: rgba(255,255,255,0.07);
            --admin-red: #E07070;
            --admin-green: #6FAF8A;
            --admin-blue: #6EA8E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--admin-bg);
            color: var(--text-white);
            min-height: 100vh;
        }

        /* ─── Navbar ─── */
        .admin-nav {
            background: var(--admin-panel);
            border-bottom: 1px solid var(--border-subtle);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-nav .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--admin-gold);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .admin-nav .brand span {
            font-size: 20px;
        }

        .admin-nav .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .admin-nav .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .admin-nav .nav-links a:hover {
            color: var(--text-white);
            background: rgba(255,255,255,0.04);
        }

        .admin-nav .nav-links a.active {
            color: var(--admin-gold);
            background: rgba(201,169,110,0.08);
        }

        .admin-nav .nav-links .logout-btn {
            color: var(--admin-red);
        }

        .admin-nav .nav-links .logout-btn:hover {
            background: rgba(224,112,112,0.1);
        }

        .admin-nav .admin-badge {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(201,169,110,0.15);
            color: var(--admin-gold);
            border: 1px solid rgba(201,169,110,0.2);
        }

        /* ─── Container ─── */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        .admin-header {
            margin-bottom: 24px;
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .admin-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* ─── Stats Grid ─── */
        .stats-grid-admin {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card-admin {
            background: var(--admin-panel);
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid var(--border-subtle);
        }

        .stat-card-admin .number {
            font-size: 32px;
            font-weight: 700;
            color: var(--admin-gold);
        }

        .stat-card-admin .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .stat-card-admin .number.green {
            color: var(--admin-green);
        }

        .stat-card-admin .number.red {
            color: var(--admin-red);
        }

        .stat-card-admin .number.blue {
            color: var(--admin-blue);
        }

        /* ─── Grid Layout ─── */
        .admin-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .admin-panel {
            background: var(--admin-panel);
            border-radius: 12px;
            padding: 20px 24px;
            border: 1px solid var(--border-subtle);
        }

        .admin-panel .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-panel .panel-title a {
            color: var(--admin-gold);
            font-size: 12px;
            text-decoration: none;
            font-weight: 400;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item .icon {
            font-size: 18px;
        }

        .activity-item .content {
            flex: 1;
        }

        .activity-item .title {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .activity-item .time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* ─── Users Table ─── */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .admin-table th {
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            padding: 8px 6px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .admin-table td {
            padding: 8px 6px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .admin-table tr:last-child td {
            border-bottom: none;
        }

        .admin-table .status-badge {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .admin-table .status-badge.active {
            background: rgba(111, 175, 138, 0.15);
            color: var(--admin-green);
            border: 1px solid rgba(111, 175, 138, 0.2);
        }

        .admin-table .status-badge.inactive {
            background: rgba(224, 112, 112, 0.15);
            color: var(--admin-red);
            border: 1px solid rgba(224, 112, 112, 0.2);
        }

        .btn-toggle {
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .btn-toggle:hover {
            background: rgba(255,255,255,0.04);
        }

        .btn-toggle.activate {
            border-color: var(--admin-green);
            color: var(--admin-green);
        }

        .btn-toggle.deactivate {
            border-color: var(--admin-red);
            color: var(--admin-red);
        }

        @media (max-width: 768px) {
            .admin-nav {
                flex-direction: column;
                gap: 12px;
                padding: 12px 16px;
            }
            .admin-nav .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .admin-container {
                padding: 16px;
            }
            .admin-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid-admin {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <nav class="admin-nav">
        <a href="{% url 'admin_dashboard:dashboard' %}" class="brand">
            <span>🛡️</span> IKIGAI Admin
        </a>
        <div class="nav-links">
    <a href="{% url 'admin_dashboard:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
    <a href="{% url 'admin_dashboard:users' %}" class="{% if request.resolver_match.url_name == 'users' %}active{% endif %}">Users</a>
    <a href="{% url 'admin_dashboard:model_list' 'tasks' %}">Tasks</a>
    <a href="{% url 'admin_dashboard:model_list' 'habits' %}">Habits</a>
    <a href="{% url 'admin_dashboard:model_list' 'goals' %}">Goals</a>
    <a href="{% url 'admin_dashboard:model_list' 'achievements' %}">Achievements</a>
    <a href="{% url 'admin_dashboard:model_list' 'notifications' %}">Notifications</a>
    <a href="{% url 'admin_dashboard:system' %}" class="{% if request.resolver_match.url_name == 'system' %}active{% endif %}">System</a>
    <span class="admin-badge">Admin</span>
    <a href="{% url 'admin_dashboard:logout' %}" class="logout-btn">Logout</a>
</div>
    </nav>

    <div class="admin-container">
        {% if messages %}
        <div style="margin-bottom: 20px;">
            {% for message in messages %}
            <div style="padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 6px; background: {% if message.tags == 'success' %}rgba(111,175,138,0.15); color: var(--admin-green); border: 1px solid rgba(111,175,138,0.2);{% elif message.tags == 'error' %}rgba(224,112,112,0.15); color: var(--admin-red); border: 1px solid rgba(224,112,112,0.2);{% else %}rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border-subtle);{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
