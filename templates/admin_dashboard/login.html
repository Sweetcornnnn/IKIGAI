<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - IKIGAI</title>
    <style>
        :root {
            --admin-gold: #C9A96E;
            --admin-bg: #0a0f1a;
            --admin-panel: #111927;
            --text-white: #FFFFFF;
            --text-muted: rgba(255,255,255,0.38);
            --border-subtle: rgba(255,255,255,0.07);
            --admin-red: #E07070;
            --admin-green: #6FAF8A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--admin-bg);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: var(--admin-panel);
            border-radius: 16px;
            padding: 40px 32px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header .shield {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--admin-gold);
            letter-spacing: 2px;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--admin-gold);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .btn-admin {
            width: 100%;
            padding: 14px;
            background: var(--admin-gold);
            color: var(--admin-bg);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .btn-admin:hover {
            opacity: 0.85;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .message.success {
            background: rgba(111, 175, 138, 0.15);
            color: var(--admin-green);
            border: 1px solid rgba(111, 175, 138, 0.2);
        }

        .message.error {
            background: rgba(224, 112, 112, 0.15);
            color: var(--admin-red);
            border: 1px solid rgba(224, 112, 112, 0.2);
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .back-link a {
            color: var(--admin-gold);
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="shield">🛡️</div>
                <h1>Admin Panel</h1>
                <p>Secure administrator access</p>
            </div>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" placeholder="Enter admin username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn-admin">🔑 Login</button>
            </form>

            <div class="back-link">
                <a href="{% url 'dashboard:home' %}">← Back to Main Site</a>
            </div>
        </div>
    </div>
</body>
</html>
